<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <rect width="600" height="400" rx="15" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <rect x="20" y="20" width="560" height="360" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="560" height="60" rx="10" fill="#0f172a"/>
  <text x="40" y="55" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">IGLOO TECNOLOGIA LTDA</text>
  <text x="560" y="55" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="end">DEMONSTRATIVO DE PAGAMENTO</text>

  <!-- Info grid -->
  <text x="40" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">EMPREGADO</text>
  <text x="40" y="128" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">ARTHUR RAUL</text>
  
  <text x="300" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">CARGO</text>
  <text x="300" y="128" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">DESENVOLVEDOR FULL STACK</text>

  <text x="480" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">PERÍODO</text>
  <text x="480" y="128" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">MAIO / 2026</text>

  <!-- Divider -->
  <line x1="40" y1="150" x2="560" y2="150" stroke="#334155" stroke-width="1"/>

  <!-- Table headers -->
  <text x="40" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">CÓD | DESCRIÇÃO</text>
  <text x="350" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="end">VENCIMENTOS</text>
  <text x="450" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="end">DESCONTOS</text>
  <text x="560" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="end">LÍQUIDO</text>

  <!-- Table rows -->
  <text x="40" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1">101  SALÁRIO BASE</text>
  <text x="350" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="end">R$ 8.500,00</text>
  
  <text x="40" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1">204  INSS</text>
  <text x="450" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="end">R$ 900,00</text>
  
  <text x="40" y="270" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1">208  IRRF</text>
  <text x="450" y="270" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="end">R$ 1.200,00</text>

  <!-- Divider -->
  <line x1="40" y1="300" x2="560" y2="300" stroke="#334155" stroke-width="1"/>

  <!-- Totals -->
  <text x="40" y="330" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">TOTAL DE VENCIMENTOS: R$ 8.500,00</text>
  <text x="560" y="330" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="end">VALOR LÍQUIDO: R$ 6.400,00</text>
  
  <!-- Footer -->
  <text x="300" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">COMPROVANTE DE RENDIMENTOS DE SIMULAÇÃO IGLOO</text>
</svg>
