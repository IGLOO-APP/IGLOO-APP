<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Gestão completa de propriedades e moradia conectada." />
    <meta name="theme-color" content="#13c8ec" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Igloo" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#13c8ec" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Igloo Property Manager</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        var isDark =
          localStorage.theme === 'dark' ||
          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var root = document.documentElement;
        if (isDark) {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
        root.style.colorScheme = isDark ? 'dark' : 'light';
      })();
    </script>
  </head>

  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
